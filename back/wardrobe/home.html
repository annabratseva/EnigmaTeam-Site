<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe</title>
</head>
<body>

<h1>{{ character.name }}</h1>
<p>Current outfit: {{ character.outfit }}</p>

<!-- кнопка открыть шкаф -->
<button onclick="toggleCloset()">Open Closet</button>

<!-- шкаф -->
<div id="closet" style="display:none; margin-top:20px;">
    <form method="POST">
        {% csrf_token %}
        <button name="outfit" value="casual">Casual</button>
        <button name="outfit" value="sport">Sport</button>
        <button name="outfit" value="formal">Formal</button>
    </form>
</div>

<script>
function toggleCloset() {
    let closet = document.getElementById("closet");
    closet.style.display = closet.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
